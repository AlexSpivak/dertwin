commands:
  # ----------------------
  # Start / Stop
  # ----------------------
  - address: 10055
    name: start_stop_standby
    func: 0x06
    type: uint16
    count: 1
    options:
      1: Power On
      2: Power Off
      3: Standby

  # ----------------------
  # Local / Remote
  # ----------------------
  - address: 10057
    name: local_remote_settings
    func: 0x06
    type: uint16
    count: 1
    options:
      0: Local/Remote
      1: Remote
      2: Local

  # ----------------------
  # Power Control Mode
  # ----------------------
  - address: 10125
    name: power_control_mode
    func: 0x06
    type: uint16
    count: 1
    description: "0: Default, 1: On-grid, 2: Off-grid, etc."

  # ----------------------
  # Active Power Setpoint (kW)
  # ----------------------
  - address: 10126
    name: on_grid_power
    func: 0x10
    type: int32
    count: 2
    scale: 0.1
    unit: kW
    description: "Positive = discharge, Negative = charge"

  # ----------------------
  # Fault Reset
  # ----------------------
  - address: 11004
    name: fault_reset
    func: 0x06
    type: uint16
    count: 1
    description: "Write 1 to reset faults"

  # ----------------------
  # SOC Limits / Control
  # ----------------------
  - address: 10325
    name: soc_upper_limit_2
    func: 0x10
    type: uint16
    count: 1
    scale: 0.1
    unit: "%"
  - address: 10327
    name: soc_upper_limit_1
    func: 0x10
    type: uint16
    count: 1
    scale: 0.1
    unit: "%"
  - address: 10330
    name: soc_lower_limit_1
    func: 0x10
    type: uint16
    count: 1
    scale: 0.1
    unit: "%"
  - address: 10332
    name: soc_lower_limit_2
    func: 0x10
    type: uint16
    count: 1
    scale: 0.1
    unit: "%"
