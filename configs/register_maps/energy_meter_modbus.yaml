protocol: modbus_tcp
device_type: energy_meter
description: "Energy Meter Modbus register map"
# Endianness: big-endian (default). For little-endian devices,
# create a device-specific register map and add endian: little to int32/uint32 registers.

registers:

  # ==========================================================
  # TELEMETRY (READ)
  # ==========================================================

  # ----------------------
  # Phase Active Power
  # ----------------------

  - name: phase_active_power_a
    internal_name: phase_active_power_a
    address: 18
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.0001
    unit: kW

  - name: phase_active_power_b
    internal_name: phase_active_power_b
    address: 20
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.0001
    unit: kW

  - name: phase_active_power_c
    internal_name: phase_active_power_c
    address: 22
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.0001
    unit: kW

  # ----------------------
  # Apparent Power
  # ----------------------

  - name: apparent_power_a
    internal_name: apparent_power_a
    address: 24
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.0001
    unit: kVA

  - name: apparent_power_b
    internal_name: apparent_power_b
    address: 26
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.0001
    unit: kVA

  - name: apparent_power_c
    internal_name: apparent_power_c
    address: 28
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.0001
    unit: kVA

  # ----------------------
  # Reactive Power
  # ----------------------

  - name: reactive_power_a
    internal_name: reactive_power_a
    address: 30
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.0001
    unit: kVar

  - name: reactive_power_b
    internal_name: reactive_power_b
    address: 32
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.0001
    unit: kVar

  - name: reactive_power_c
    internal_name: reactive_power_c
    address: 34
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.0001
    unit: kVar

  # ----------------------
  # System Totals
  # ----------------------

  - name: total_active_power
    internal_name: total_active_power
    address: 40
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.0001
    unit: kW

  - name: total_reactive_power
    internal_name: total_reactive_power
    address: 44
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.0001
    unit: kVar

  # ----------------------
  # Power Factor and Frequency
  # ----------------------

  - name: total_power_factor
    internal_name: total_power_factor
    address: 49
    func: 0x04
    direction: read
    type: int16
    count: 1
    scale: 0.001
    unit: ""

  - name: grid_frequency
    internal_name: grid_frequency
    address: 51
    func: 0x04
    direction: read
    type: uint16
    count: 1
    scale: 0.1
    unit: Hz

  # ----------------------
  # Total Energy
  # ----------------------

  - name: total_import_energy
    internal_name: total_import_energy
    address: 52
    func: 0x04
    direction: read
    type: uint32
    count: 2
    scale: 0.1
    unit: kWh

  - name: total_export_energy
    internal_name: total_export_energy
    address: 78
    func: 0x04
    direction: read
    type: uint32
    count: 2
    scale: 0.1
    unit: kWh


  # ----------------------
  # Demand
  # ----------------------

  - name: current_demand_kw
    internal_name: current_demand_kw
    address: 56
    func: 0x04
    direction: read
    type: uint32
    count: 2
    scale: 0.0001
    unit: kW
    description: "Sliding window average demand (default 15-minute window)"

  - name: max_demand_kw
    internal_name: max_demand_kw
    address: 58
    func: 0x04
    direction: read
    type: uint32
    count: 2
    scale: 0.0001
    unit: kW
    description: "Peak demand since last reset"

  # ----------------------
  # Phase Voltages
  # ----------------------

  - name: phase_voltage_a
    internal_name: phase_voltage_a
    address: 0
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.1
    unit: V

  - name: phase_voltage_b
    internal_name: phase_voltage_b
    address: 2
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.1
    unit: V

  - name: phase_voltage_c
    internal_name: phase_voltage_c
    address: 4
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.1
    unit: V

  # ----------------------
  # Phase Currents
  # ----------------------

  - name: phase_current_a
    internal_name: phase_current_a
    address: 12
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.001
    unit: A

  - name: phase_current_b
    internal_name: phase_current_b
    address: 14
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.001
    unit: A

  - name: phase_current_c
    internal_name: phase_current_c
    address: 16
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.001
    unit: A

  # ----------------------
  # Per-Phase Import Energy
  # ----------------------

  - name: phase_import_energy_a
    internal_name: phase_import_energy_a
    address: 64
    func: 0x04
    direction: read
    type: uint32
    count: 2
    scale: 0.1
    unit: kWh

  - name: phase_import_energy_b
    internal_name: phase_import_energy_b
    address: 66
    func: 0x04
    direction: read
    type: uint32
    count: 2
    scale: 0.1
    unit: kWh

  - name: phase_import_energy_c
    internal_name: phase_import_energy_c
    address: 68
    func: 0x04
    direction: read
    type: uint32
    count: 2
    scale: 0.1
    unit: kWh

  # ----------------------
  # Per-Phase Export Energy
  # ----------------------

  - name: phase_export_energy_a
    internal_name: phase_export_energy_a
    address: 70
    func: 0x04
    direction: read
    type: uint32
    count: 2
    scale: 0.1
    unit: kWh

  - name: phase_export_energy_b
    internal_name: phase_export_energy_b
    address: 72
    func: 0x04
    direction: read
    type: uint32
    count: 2
    scale: 0.1
    unit: kWh

  - name: phase_export_energy_c
    internal_name: phase_export_energy_c
    address: 74
    func: 0x04
    direction: read
    type: uint32
    count: 2
    scale: 0.1
    unit: kWh


  # ==========================================================
  # COMMANDS (WRITE)
  # ==========================================================

  - name: current_transformer_ratio
    internal_name: current_transformer_ratio
    address: 4099
    func: 0x06
    direction: write
    type: uint32
    count: 2
    scale: 0.1

  - name: voltage_transformer_ratio
    internal_name: voltage_transformer_ratio
    address: 4101
    func: 0x06
    direction: write
    type: uint32
    count: 2
    scale: 0.1

  - name: interval_time
    internal_name: interval_time
    address: 4112
    func: 0x06
    direction: write
    type: uint32
    count: 2
