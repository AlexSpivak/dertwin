protocol: modbus_tcp
device_type: energy_meter
description: "Energy Meter Modbus register map"

registers:

  # ==========================================================
  # TELEMETRY (READ)
  # ==========================================================

  - name: total_active_power
    internal_name: total_active_power
    address: 0
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.01
    unit: kW

  - name: total_reactive_power
    internal_name: total_reactive_power
    address: 2
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.01
    unit: kVar

  - name: total_power_factor
    internal_name: total_power_factor
    address: 12
    func: 0x04
    direction: read
    type: int16
    count: 1
    scale: 0.001
    unit: ""

  - name: grid_frequency
    internal_name: grid_frequency
    address: 13
    func: 0x04
    direction: read
    type: uint16
    count: 1
    scale: 0.01
    unit: Hz

  - name: total_import_energy
    internal_name: total_import_energy
    address: 26
    func: 0x04
    direction: read
    type: uint32
    count: 2
    scale: 0.01
    unit: kWh

  - name: total_export_energy
    internal_name: total_export_energy
    address: 28
    func: 0x04
    direction: read
    type: uint32
    count: 2
    scale: 0.01
    unit: kWh


  # ----------------------
  # Phase A
  # ----------------------

  - name: phase_voltage_a
    internal_name: phase_voltage_a
    address: 14
    func: 0x04
    direction: read
    type: uint16
    count: 1
    scale: 0.1
    unit: V

  - name: phase_current_a
    internal_name: phase_current_a
    address: 15
    func: 0x04
    direction: read
    type: int16
    count: 1
    scale: 0.01
    unit: A

  - name: phase_active_power_a
    internal_name: phase_active_power_a
    address: 16
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.01
    unit: kW


  # ----------------------
  # Phase B
  # ----------------------

  - name: phase_voltage_b
    internal_name: phase_voltage_b
    address: 18
    func: 0x04
    direction: read
    type: uint16
    count: 1
    scale: 0.1
    unit: V

  - name: phase_current_b
    internal_name: phase_current_b
    address: 19
    func: 0x04
    direction: read
    type: int16
    count: 1
    scale: 0.01
    unit: A

  - name: phase_active_power_b
    internal_name: phase_active_power_b
    address: 20
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.01
    unit: kW


  # ----------------------
  # Phase C
  # ----------------------

  - name: phase_voltage_c
    internal_name: phase_voltage_c
    address: 22
    func: 0x04
    direction: read
    type: uint16
    count: 1
    scale: 0.1
    unit: V

  - name: phase_current_c
    internal_name: phase_current_c
    address: 23
    func: 0x04
    direction: read
    type: int16
    count: 1
    scale: 0.01
    unit: A

  - name: phase_active_power_c
    internal_name: phase_active_power_c
    address: 24
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.01
    unit: kW


  # ----------------------
  # Apparent Power
  # ----------------------

  - name: apparent_power_a
    internal_name: apparent_power_a
    address: 30
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.0001
    unit: kVA

  - name: apparent_power_b
    internal_name: apparent_power_b
    address: 32
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.0001
    unit: kVA

  - name: apparent_power_c
    internal_name: apparent_power_c
    address: 34
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.0001
    unit: kVA


  # ----------------------
  # Reactive Power
  # ----------------------

  - name: reactive_power_a
    internal_name: reactive_power_a
    address: 36
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.0001
    unit: kVar

  - name: reactive_power_b
    internal_name: reactive_power_b
    address: 38
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.0001
    unit: kVar

  - name: reactive_power_c
    internal_name: reactive_power_c
    address: 40
    func: 0x04
    direction: read
    type: int32
    count: 2
    scale: 0.0001
    unit: kVar


  # ==========================================================
  # COMMANDS (WRITE)
  # ==========================================================

  - name: current_transformer_ratio
    internal_name: current_transformer_ratio
    address: 4099
    func: 0x06
    direction: write
    type: uint32
    count: 2
    scale: 0.1

  - name: voltage_transformer_ratio
    internal_name: voltage_transformer_ratio
    address: 4101
    func: 0x06
    direction: write
    type: uint32
    count: 2
    scale: 0.1

  - name: interval_time
    internal_name: interval_time
    address: 4112
    func: 0x06
    direction: write
    type: uint32
    count: 2
